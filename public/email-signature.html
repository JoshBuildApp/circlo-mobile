<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Circlo Email Signature</title>
</head>
<body style="margin:0;padding:0;font-family:'Inter',Arial,Helvetica,sans-serif;">

<!-- Copy everything inside this table into your email signature settings -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:'Inter',Arial,Helvetica,sans-serif;font-size:14px;line-height:1.4;color:#1A1A2E;">
  <tr>
    <td style="padding-right:18px;vertical-align:middle;border-right:3px solid #00D4AA;">
      <!-- Circlo Logo — place your orange logo as circlo-logo-orange.png in the same folder -->
      <img src="circlo-logo-orange.png" width="52" height="52" alt="Circlo" style="display:block;border-radius:50%;" />
    </td>
    <td style="padding-left:18px;vertical-align:middle;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td>
            <span style="font-size:17px;font-weight:700;color:#1A1A2E;letter-spacing:-0.01em;">Guy Avnaim</span>
          </td>
        </tr>
        <tr>
          <td style="padding-top:2px;">
            <span style="font-size:12px;font-weight:600;color:#00D4AA;text-transform:uppercase;letter-spacing:0.08em;">Founder</span>
            <span style="font-size:12px;color:#B0B0B0;padding:0 6px;">|</span>
            <span style="font-size:13px;font-weight:700;color:#1A1A2E;letter-spacing:-0.01em;">circlo</span>
          </td>
        </tr>
        <tr>
          <td style="padding-top:10px;">
            <a href="mailto:CircloClubManagement@circloclub.com" style="font-size:12px;color:#FF6B2C;text-decoration:none;font-weight:500;">CircloClubManagement@circloclub.com</a>
          </td>
        </tr>
        <tr>
          <td style="padding-top:4px;">
            <a href="https://circloclub.com" style="font-size:11px;color:#5BA88A;text-decoration:none;font-weight:500;letter-spacing:0.02em;">circloclub.com</a>
          </td>
        </tr>
        <tr>
          <td style="padding-top:10px;">
            <span style="font-size:10px;color:#B0B0B0;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;">Join the Circle</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

</body>
</html>
