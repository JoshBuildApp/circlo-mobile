<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Circlo Prototype</title>
<style>
  :root {
    --teal: #00D4AA;
    --teal-soft: #00d4aa33;
    --teal-dim: #00d4aa1a;
    --orange: #FF6B2C;
    --orange-soft: #ff6b2c33;
    --orange-dim: #ff6b2c1a;
    --navy-deep: #0A0A0F;
    --navy-card: #1A1A2E;
    --navy-card-2: #21213a;
    --navy-line: #2a2a42;
    --off-white: #F5F2EC;
    --muted: #9a9ab0;
    --muted-2: #6b6b80;
    --red: #ff4d6d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #E8E4DC; font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", system-ui, sans-serif; color: var(--off-white); }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 12px 120px; }

  /* Top header */
  .app-header {
    width: 100%; max-width: 420px; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
    color: #333;
  }
  .app-header h1 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
  .app-header .sub { font-size: 12px; color: #666; }

  /* Phone frame */
  .phone {
    width: 390px; height: 780px;
    background: var(--navy-deep);
    border-radius: 44px;
    border: 2px solid #0a0a0f;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 0 0 10px #0a0a0f;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .phone::before {
    content: ""; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px; background: #000; border-radius: 20px; z-index: 100;
  }

  /* Status bar */
  .status-bar {
    height: 44px; padding: 14px 28px 0; display: flex; justify-content: space-between;
    align-items: flex-start; font-size: 14px; font-weight: 600; color: var(--off-white); z-index: 50;
  }
  .status-bar .right { display: flex; gap: 6px; align-items: center; font-size: 12px; }

  /* Scroll area */
  .screen {
    flex: 1; overflow-y: auto; overflow-x: hidden; position: relative;
    padding-bottom: 96px; /* for tab bar */
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* Tab bar (bottom nav) */
  .tabbar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 84px; padding: 10px 16px 20px;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--navy-line);
    display: flex; justify-content: space-around; align-items: center;
    z-index: 60;
  }
  .tabbar .tab {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--muted-2); font-size: 10px; font-weight: 500; cursor: pointer;
    padding: 4px 10px; border-radius: 10px;
  }
  .tabbar .tab.active { color: var(--teal); }
  .tabbar .tab svg { width: 22px; height: 22px; }

  /* Typography */
  .display { font-size: 34px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; }
  .h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  .h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.015em; }
  .h3 { font-size: 16px; font-weight: 700; }
  .body { font-size: 14px; color: var(--off-white); line-height: 1.5; }
  .meta { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .caption { font-size: 12px; color: var(--muted); }

  /* Common pieces */
  .row { display: flex; align-items: center; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .card { background: var(--navy-card); border-radius: 18px; padding: 16px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; background: var(--navy-card); color: var(--off-white); }
  .chip-teal { background: var(--teal-dim); color: var(--teal); }
  .chip-orange { background: var(--orange-dim); color: var(--orange); }
  .chip-dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; margin-right: 2px; }
  .pill { padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; background: var(--navy-card); color: var(--off-white); border: none; cursor: pointer; }
  .pill.active { background: var(--teal); color: var(--navy-deep); }
  .btn { padding: 12px 18px; border-radius: 14px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; }
  .btn-teal { background: var(--teal); color: var(--navy-deep); }
  .btn-orange { background: var(--orange); color: #fff; }
  .btn-ghost { background: var(--navy-card); color: var(--off-white); }
  .btn-full { width: 100%; padding: 16px; border-radius: 16px; font-size: 15px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), #3dd9b1); flex-shrink: 0; }
  .avatar-lg { width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), #ffd97a); }
  .avatar-orange { background: linear-gradient(135deg, var(--orange), #ff9d6c); }

  .content-pad { padding: 0 20px; }

  /* Section header */
  .sec-head { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin: 24px 0 12px; }
  .sec-head h2 { font-size: 17px; font-weight: 700; margin: 0; }
  .sec-head a { color: var(--teal); font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; }

  /* horizontal scrollers */
  .hscroll { display: flex; gap: 12px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
  .hscroll::-webkit-scrollbar { display: none; }

  /* Live card */
  .live-card {
    min-width: 140px; height: 150px; border-radius: 18px; padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: var(--teal); color: var(--navy-deep);
  }
  .live-card.orange { background: var(--orange); color: #fff; }
  .live-card .live-badge { font-size: 10px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .live-card .live-badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Coach card (home) */
  .coach-card {
    min-width: 155px; border-radius: 18px; padding: 14px; background: var(--teal);
    display: flex; flex-direction: column; gap: 36px; color: var(--navy-deep);
    height: 170px; position: relative;
  }
  .coach-card.orange { background: var(--orange); color: #fff; }
  .coach-card .tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.3); color: #fff; padding: 4px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; }
  .coach-card h4 { margin: 0; font-size: 15px; font-weight: 700; }
  .coach-card .meta-line { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; }

  /* Next session */
  .next-session {
    margin: 8px 20px 24px; padding: 16px; border-radius: 18px;
    background: linear-gradient(135deg, #143832, #0f2a25);
    display: flex; align-items: center; gap: 14px; cursor: pointer;
  }
  .next-session .icon {
    width: 48px; height: 48px; border-radius: 12px; background: rgba(0,212,170,0.15);
    display: flex; align-items: center; justify-content: center; color: var(--teal);
  }
  .next-session .lbl { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; color: var(--teal); }

  /* circle post */
  .post {
    margin: 0 20px 12px; padding: 14px; border-radius: 16px; background: var(--navy-card);
    display: flex; gap: 12px;
  }
  .post .body-text { font-size: 13px; line-height: 1.45; color: var(--off-white); }
  .post .react { display: flex; gap: 14px; margin-top: 8px; color: var(--muted); font-size: 12px; }

  /* Discover specific */
  .discover-tabs { display: flex; background: var(--navy-card); border-radius: 14px; padding: 4px; margin: 12px 20px 16px; }
  .discover-tabs button { flex: 1; padding: 10px; border: none; border-radius: 10px; background: transparent; color: var(--muted); font-weight: 700; font-size: 13px; cursor: pointer; }
  .discover-tabs button.active { background: var(--navy-card-2); color: var(--off-white); }
  .search-box {
    margin: 0 20px; padding: 12px 16px; border-radius: 14px; background: var(--navy-card);
    display: flex; align-items: center; gap: 10px; color: var(--muted);
  }
  .search-box input {
    flex: 1; background: transparent; border: none; color: var(--off-white); font-size: 14px; outline: none;
  }

  .filter-row { margin-top: 14px; }
  .sport-tiles { display: flex; gap: 12px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
  .sport-tiles::-webkit-scrollbar { display: none; }
  .sport-tile {
    min-width: 88px; height: 88px; border-radius: 16px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-weight: 700; font-size: 13px;
  }
  .sport-tile.teal { background: var(--teal); color: var(--navy-deep); }
  .sport-tile.orange { background: var(--orange); color: #fff; }
  .sport-tile.dark { background: var(--navy-card); color: var(--off-white); }

  .near-card {
    min-width: 180px; height: 140px; border-radius: 18px; padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .near-card.teal { background: var(--teal); color: var(--navy-deep); }
  .near-card.orange { background: var(--orange); color: #fff; }
  .near-card .tags { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; }
  .near-card .tag-pill { background: rgba(0,0,0,0.3); color: #fff; padding: 3px 8px; border-radius: 999px; }

  .trending-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; background: var(--navy-card); border-radius: 16px; margin: 0 20px 8px; }
  .trending-row .rank { font-size: 22px; font-weight: 800; color: var(--muted); min-width: 22px; }
  .trending-row .av { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), #3dd9b1); flex-shrink: 0; }
  .trending-row .info { flex: 1; }
  .trending-row .info h4 { margin: 0; font-size: 14px; font-weight: 700; }
  .trending-row .info p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }
  .trending-row .up { color: var(--teal); font-size: 12px; font-weight: 700; }

  .new-card {
    min-width: 155px; height: 170px; border-radius: 18px; padding: 14px;
    background: var(--navy-card); display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
  }
  .new-card .badge { position: absolute; top: 10px; right: 10px; background: var(--navy-card-2); color: var(--off-white); padding: 4px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; }
  .new-card h4 { margin: 0; font-size: 14px; font-weight: 700; }
  .new-card p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }

  .community-card {
    min-width: 220px; border-radius: 18px; padding: 16px; display: flex; flex-direction: column; gap: 10px;
  }
  .community-card.teal { background: var(--teal); color: var(--navy-deep); }
  .community-card.orange { background: var(--orange); color: #fff; }
  .community-card .count { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .community-card .count::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Coach profile */
  .profile-head {
    padding: 20px 20px 0; background: linear-gradient(180deg, #0d2f29 0%, var(--navy-deep) 70%);
    min-height: 260px; position: relative;
  }
  .profile-head .top-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .round-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; color: var(--off-white); cursor: pointer; border: none; }
  .profile-head .badges { display: flex; gap: 8px; margin-bottom: 14px; }
  .profile-head .av-wrap { display: flex; justify-content: center; margin-bottom: 14px; position: relative; }
  .profile-head .av-wrap::after { content: ""; position: absolute; bottom: 6px; right: calc(50% - 48px); width: 16px; height: 16px; background: var(--teal); border-radius: 50%; border: 3px solid var(--navy-deep); }
  .profile-head .name { text-align: center; font-size: 26px; font-weight: 800; margin: 0 0 4px; letter-spacing: -0.02em; }
  .profile-head .sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  .tabs-row { display: flex; gap: 20px; padding: 0 20px; border-bottom: 1px solid var(--navy-line); margin-bottom: 16px; }
  .tabs-row button {
    background: transparent; border: none; color: var(--muted); font-weight: 700; font-size: 15px;
    padding: 12px 0; cursor: pointer; position: relative; display: flex; align-items: center; gap: 6px;
  }
  .tabs-row button.active { color: var(--off-white); }
  .tabs-row button.active::after {
    content: ""; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--teal);
  }
  .tabs-row .num { font-size: 11px; background: var(--navy-card); padding: 2px 8px; border-radius: 999px; color: var(--muted); }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; margin-bottom: 14px; }
  .stat { padding: 14px; border-radius: 14px; background: var(--navy-card); }
  .stat .lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
  .stat .val { font-size: 22px; font-weight: 800; color: var(--off-white); letter-spacing: -0.02em; }
  .stat .val .star { color: var(--teal); }
  .stat .val.orange-txt { color: var(--orange); }
  .stat .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .about-box { padding: 16px; border-radius: 14px; background: var(--navy-card); margin: 0 20px 14px; }
  .about-box .lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
  .about-box p { margin: 0 0 10px; font-size: 13px; line-height: 1.5; }
  .about-box .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .about-box .tag-item { padding: 6px 10px; border-radius: 999px; background: var(--teal-dim); color: var(--teal); font-size: 12px; font-weight: 600; }
  .about-box .tag-item.orange { background: var(--orange-dim); color: var(--orange); }

  .book-bar {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px 20px;
    background: rgba(10,10,15,0.95); backdrop-filter: blur(20px);
    border-top: 1px solid var(--navy-line); display: flex; align-items: center; justify-content: space-between; z-index: 70;
  }
  .book-bar .left .lbl { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.05em; }
  .book-bar .left .val { font-size: 14px; font-weight: 700; color: var(--off-white); }
  .book-bar button { padding: 12px 26px; border-radius: 14px; background: var(--orange); color: #fff; border: none; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }

  /* Community tab content */
  .circle-hero {
    margin: 0 20px 16px; border-radius: 18px; overflow: hidden;
    background: linear-gradient(135deg, #0f3b33, #0a2722);
    padding: 20px; position: relative;
  }
  .circle-hero .online-chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; color: var(--teal); }
  .circle-hero .online-chip::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }
  .circle-hero .grad-circle { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), #ffd97a); margin: 16px 0 0 auto; }
  .circle-hero .title { margin-top: -30px; }
  .circle-hero h3 { margin: 0; font-size: 18px; font-weight: 700; }
  .circle-hero p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }
  .circle-hero .join-btn { position: absolute; top: 16px; right: 16px; background: var(--teal); color: var(--navy-deep); padding: 8px 14px; border-radius: 999px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; }

  .circle-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0 20px 20px; }
  .circle-stats .s { padding: 14px; border-radius: 14px; background: var(--navy-card); text-align: left; }
  .circle-stats .s .big { font-size: 22px; font-weight: 800; }
  .circle-stats .s .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .recent-post {
    margin: 0 20px 10px; padding: 14px; border-radius: 16px; background: var(--navy-card);
    display: flex; gap: 10px;
  }
  .recent-post .av { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), #ffd97a); flex-shrink: 0; }
  .recent-post .name-row { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }
  .recent-post .coach-badge { background: var(--teal-dim); color: var(--teal); padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; }
  .recent-post .body-text { font-size: 13px; margin: 4px 0 8px; line-height: 1.45; }
  .recent-post .react { display: flex; gap: 14px; color: var(--muted); font-size: 12px; }

  /* Shop tab */
  .shop-featured {
    margin: 0 20px 14px; padding: 18px; border-radius: 18px;
    background: linear-gradient(135deg, #3a1c0f, #1f140a);
    position: relative; overflow: hidden;
  }
  .shop-featured .bs-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 800; color: var(--orange); letter-spacing: 0.06em; text-transform: uppercase; }
  .shop-featured h3 { margin: 10px 0 4px; font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .shop-featured p { margin: 0 0 14px; font-size: 12px; color: var(--muted); }
  .shop-featured .row-bot { display: flex; justify-content: space-between; align-items: center; }
  .shop-featured .price { font-size: 22px; font-weight: 800; }
  .shop-featured .price sub { font-size: 11px; color: var(--muted); margin-left: 4px; font-weight: 600; vertical-align: top; text-transform: uppercase; letter-spacing: 0.04em; }
  .shop-featured .buy-btn { background: var(--off-white); color: var(--navy-deep); padding: 10px 18px; border-radius: 999px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; }

  .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; }
  .shop-item {
    border-radius: 16px; padding: 14px; height: 150px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .shop-item.teal { background: var(--teal); color: var(--navy-deep); }
  .shop-item.orange { background: var(--orange); color: #fff; }
  .shop-item.teal-2 { background: #02a683; color: var(--navy-deep); }
  .shop-item.dark { background: var(--navy-card); color: var(--off-white); }
  .shop-item .icon-box { width: 36px; height: 36px; border-radius: 10px; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
  .shop-item h4 { margin: 0; font-size: 14px; font-weight: 700; }
  .shop-item p { margin: 2px 0 0; font-size: 11px; opacity: 0.8; }
  .shop-item .price { margin-top: auto; font-size: 13px; font-weight: 700; }

  /* Tier picker */
  .tier-head { text-align: center; padding: 20px; }
  .tier-head .big-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), #ffd97a); margin: 0 auto 20px; }
  .tier-head .lbl { font-size: 10px; font-weight: 800; color: var(--teal); letter-spacing: 0.1em; }
  .tier-head h2 { margin: 8px 0 6px; font-size: 24px; font-weight: 800; }
  .tier-head p { font-size: 12px; color: var(--muted); margin: 0; }

  .tier-card {
    margin: 0 20px 12px; padding: 18px; border-radius: 18px; background: var(--navy-card);
    border: 1px solid var(--navy-line); position: relative;
  }
  .tier-card .tier-head-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .tier-card .tier-lbl { font-size: 10px; font-weight: 800; color: var(--muted); letter-spacing: 0.08em; }
  .tier-card .tier-price { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-top: 4px; }
  .tier-card.selected { border-color: var(--teal); background: linear-gradient(180deg, #0f3b33, #0a2722); }
  .tier-card.vip { background: linear-gradient(180deg, #3a1c0f, #1f140a); border-color: var(--orange); }
  .tier-card .popular { position: absolute; top: -10px; right: 20px; background: var(--teal); color: var(--navy-deep); padding: 4px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; }
  .tier-card ul { margin: 0; padding: 0; list-style: none; }
  .tier-card li { font-size: 13px; margin-bottom: 8px; display: flex; gap: 8px; align-items: flex-start; }
  .tier-card li::before { content: "✓"; color: var(--teal); font-weight: 700; flex-shrink: 0; }
  .tier-card.vip li::before { content: "★"; color: var(--orange); }
  .tier-card .cta { width: 100%; margin-top: 12px; padding: 14px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; }

    'content-library': contentLibraryScreen,
    'video-player': videoPlayerScreen,
    'live-viewer': liveViewerScreen,

  }[scr.id];

}

}
