<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Circlo — Auth & Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #00D4AA;
    --teal-dim: #00B894;
    --orange: #FF6B2C;
    --navy-deep: #0A0A0F;
    --navy-card: #1A1A2E;
    --navy-elev: #242438;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #F5F5F7;
    --text-dim: #9B9BA8;
    --text-faint: #5C5C6E;
    --error: #FF4D6D;

    /* Custom easings */
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
    --ease-swift: cubic-bezier(0.65, 0, 0.35, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: #000;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overflow: hidden;
  }
  .stage {
    width: 100vw; height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px; overflow: auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 32px;
    max-width: 1800px; width: 100%;
    padding: 40px 0;
  }
  .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .phone-label {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .phone {
    width: 380px; height: 780px;
    background: var(--navy-deep);
    border-radius: 44px;
    border: 8px solid #0a0a0f;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }
  .notch {
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: #000; border-radius: 0 0 18px 18px; z-index: 10;
  }
  .status-bar {
    padding: 14px 24px 0;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 700; color: var(--text); z-index: 5;
  }
  .status-icons { display: flex; gap: 4px; align-items: center; font-size: 11px; }
  .screen {
    flex: 1; display: flex; flex-direction: column;
    padding: 20px 24px 32px;
    overflow-y: auto; position: relative;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* ========= HEADER ========= */
  .page-header {
    display: flex; align-items: center; gap: 12px;
    padding-top: 16px;
    margin-bottom: 20px;
    min-height: 48px;
    position: relative;
  }
  .back-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--navy-card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text); flex-shrink: 0;
    transition: all 0.15s;
  }
  .back-btn:hover { background: var(--navy-elev); border-color: var(--teal); }
  .progress-track {
    flex: 1; height: 4px; background: var(--navy-card);
    border-radius: 2px; overflow: hidden; position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-dim));
    border-radius: 2px;
    transition: width 0.4s var(--ease-smooth);
  }
  .step-count {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }

  /* ========= PER-PAGE RING POSITIONING ========= */
  /* Each ring gets its own slot inside the phone, absolutely positioned.
     The FLIP transition reads the position from these, so we can move them
     anywhere on the screen by just changing CSS. */
  .page-mark {
    position: absolute;
    z-index: 3;
    filter: drop-shadow(0 6px 20px rgba(0, 212, 170, 0.35)) drop-shadow(0 3px 14px rgba(255, 107, 44, 0.22));
    transition: opacity 0.2s ease;
    pointer-events: none;
  }
  .page-mark.hidden { opacity: 0; }
  .page-mark svg { width: 100%; height: 100%; display: block; }

  /* Subtle idle breathing — the ring feels alive when it's at rest */
  .page-mark:not(.hidden) svg {
    animation: ringBreathe 4s ease-in-out infinite;
  }
  @keyframes ringBreathe {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.03) rotate(2deg); }
  }

  /* Welcome: big hero mark in the vertical center */
  .mark-welcome {
    top: 140px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 120px;
    filter: drop-shadow(0 8px 36px rgba(0, 212, 170, 0.45)) drop-shadow(0 4px 24px rgba(255, 107, 44, 0.28));
  }

  /* Login: floating top-right corner, medium */
  .mark-login {
    top: 62px; right: 24px;
    width: 56px; height: 56px;
  }

  /* Role: top-center, above the question title */
  .mark-role {
    top: 80px; left: 50%;
    transform: translateX(-50%);
    width: 64px; height: 64px;
  }

  /* Sports: small top-right next to progress */
  .mark-sports {
    top: 64px; right: 24px;
    width: 36px; height: 36px;
  }

  /* Credentials: top-right mark */
  .mark-credentials {
    top: 62px; right: 24px;
    width: 44px; height: 44px;
  }

  /* Verify: centered above headline, medium-large */
  .mark-verify {
    top: 96px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 80px;
  }

  /* Success: big, positioned above text */
  .mark-success {
    top: 130px; left: 50%;
    transform: translateX(-50%);
    width: 140px; height: 140px;
    filter: drop-shadow(0 0 50px rgba(0, 212, 170, 0.55)) drop-shadow(0 0 30px rgba(255, 107, 44, 0.4));
  }

  /* Success: pause breathing so the "opening" animation plays cleanly */
  .mark-success.opening svg {
    animation: none;
  }

  /* Hide the dot entirely on the success ring — cleaner C-shape */
  .mark-success .t-dot {
    display: none;
  }

  /* ========= SPACERS (reserve room in flow for the absolute mark) ========= */
  .spacer-welcome { height: 300px; }
  .spacer-role-top { height: 60px; }
  .spacer-verify-top { height: 80px; }
  .spacer-success-top { height: 230px; }

  /* Typography */
  .screen-title {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.02em; line-height: 1.15;
    margin-bottom: 8px;
  }
  .screen-subtitle {
    font-size: 15px; color: var(--text-dim);
    line-height: 1.5; margin-bottom: 24px;
  }

  /* Buttons */
  .btn {
    width: 100%; padding: 16px;
    border-radius: 14px; border: none;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    gap: 10px; letter-spacing: -0.01em;
  }
  .btn-primary { background: var(--teal); color: var(--navy-deep); }
  .btn-primary:hover { background: var(--teal-dim); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--navy-card); color: var(--text); border: 1px solid var(--border-strong); }
  .btn-secondary:hover { background: var(--navy-elev); }
  .btn-social { background: #fff; color: #000; }
  .btn-social:hover { background: #f0f0f0; }
  .btn-apple { background: #000; color: #fff; border: 1px solid var(--border-strong); }
  .btn-apple:hover { background: #111; }
  .btn-stack { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .btn-glass {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.16);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .btn-glass:hover { background: rgba(255, 255, 255, 0.14); }
  .btn-icon-only { padding: 14px; gap: 0; }
  .btn-icon-only svg { width: 22px; height: 22px; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span {
    font-size: 12px; color: var(--text-faint);
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .divider-splash { margin: 8px 0; }
  .divider-splash::before, .divider-splash::after { background: rgba(255, 255, 255, 0.12); }
  .divider-splash span { color: rgba(255, 255, 255, 0.5); }

  /* Form fields */
  .field { margin-bottom: 16px; }
  .field-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input {
    width: 100%; padding: 16px 16px 16px 48px;
    background: var(--navy-card); border: 1.5px solid var(--border);
    border-radius: 14px; color: var(--text);
    font-family: inherit; font-size: 15px; font-weight: 500;
    transition: all 0.15s; outline: none;
  }
  .input::placeholder { color: var(--text-faint); }
  .input:focus { border-color: var(--teal); background: var(--navy-elev); }
  .input-icon {
    position: absolute; left: 16px; top: 50%;
    transform: translateY(-50%); color: var(--text-faint); pointer-events: none;
  }
  .input-toggle {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%); padding: 8px;
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-family: inherit;
  }
  .field-hint { font-size: 12px; color: var(--text-faint); margin-top: 6px; padding-left: 4px; }

  .link-row { display: flex; justify-content: flex-end; margin-top: -8px; margin-bottom: 20px; }
  .link {
    font-size: 13px; font-weight: 600; color: var(--teal);
    cursor: pointer; background: none; border: none; font-family: inherit;
  }
  .link:hover { text-decoration: underline; }
  .footer-link { text-align: center; font-size: 14px; color: var(--text-dim); margin-top: 24px; }
  .footer-link .link { color: var(--teal); margin-left: 4px; }
  .terms-line {
    font-size: 12px; color: var(--text-faint);
    text-align: center; line-height: 1.6;
    margin-top: 20px; padding: 0 8px;
  }
  .terms-line .link { font-size: 12px; display: inline; }

  /* Role cards */
  .role-stack { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
  .role-card {
    display: flex; gap: 16px; padding: 20px;
    background: var(--navy-card); border: 1.5px solid var(--border);
    border-radius: 18px; cursor: pointer; transition: all 0.2s;
    align-items: center; text-align: left; width: 100%;
    font-family: inherit; color: var(--text);
  }
  .role-card:hover { background: var(--navy-elev); border-color: var(--border-strong); }
  .role-card.selected { border-color: var(--teal); background: rgba(0, 212, 170, 0.06); }
  .role-card.selected .role-icon { background: var(--teal); color: var(--navy-deep); }
  .role-icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: var(--navy-elev);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .role-text h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
  .role-text p { font-size: 13px; color: var(--text-dim); line-height: 1.4; }
  .role-check {
    margin-left: auto; width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .role-card.selected .role-check { background: var(--teal); border-color: var(--teal); }
  .role-card.selected .role-check svg { display: block; }
  .role-check svg { display: none; width: 14px; height: 14px; color: var(--navy-deep); }

  /* OTP */
  .otp-row { display: flex; gap: 10px; justify-content: center; margin: 8px 0 24px; }
  .otp-digit {
    width: 48px; height: 56px;
    background: var(--navy-card); border: 1.5px solid var(--border);
    border-radius: 12px; text-align: center;
    font-family: inherit; font-size: 22px; font-weight: 700;
    color: var(--text); outline: none; transition: all 0.15s;
  }
  .otp-digit:focus { border-color: var(--teal); background: var(--navy-elev); }
  .otp-digit.filled { border-color: var(--teal); }
  .resend-row { text-align: center; font-size: 13px; color: var(--text-dim); margin-top: 16px; }
  .email-display {
    background: var(--navy-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    font-size: 14px; font-weight: 600; color: var(--text);
    text-align: center; margin-bottom: 24px;
  }

  /* Sports grid */
  .sport-scroll {
    flex: 1; overflow-y: auto;
    margin: 0 -8px; padding: 0 8px 12px;
    mask-image: linear-gradient(to bottom, black calc(100% - 32px), transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black calc(100% - 32px), transparent 100%);
  }
  .sport-scroll::-webkit-scrollbar { display: none; }
  .sport-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 16px; }
  .sport-card {
    aspect-ratio: 1;
    background: var(--navy-card); border: 1.5px solid var(--border);
    border-radius: 16px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; transition: all 0.2s;
    position: relative; font-family: inherit; color: var(--text);
    padding: 8px; overflow: hidden;
  }
  .sport-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 110%, rgba(0,212,170,0.12), transparent 60%);
    opacity: 0; transition: opacity 0.2s;
  }
  .sport-card:hover { background: var(--navy-elev); transform: translateY(-2px); }
  .sport-card:hover::before { opacity: 1; }
  .sport-card.selected { border-color: var(--teal); background: rgba(0, 212, 170, 0.08); }
  .sport-card.selected::before {
    opacity: 1;
    background: radial-gradient(circle at 50% 110%, rgba(0,212,170,0.25), transparent 70%);
  }
  .sport-emoji { font-size: 32px; position: relative; z-index: 1; transition: transform 0.2s; }
  .sport-card.selected .sport-emoji { transform: scale(1.1); }
  .sport-name { font-size: 12px; font-weight: 600; color: var(--text); position: relative; z-index: 1; text-align: center; line-height: 1.2; }
  .sport-check {
    position: absolute; top: 6px; right: 6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--teal);
    display: none; align-items: center; justify-content: center;
    z-index: 2; box-shadow: 0 2px 8px rgba(0, 212, 170, 0.4);
  }
  .sport-card.selected .sport-check { display: flex; }
  .sport-check svg { width: 11px; height: 11px; color: var(--navy-deep); }
  .sel-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: rgba(0, 212, 170, 0.12); color: var(--teal);
    border-radius: 999px;
    font-size: 12px; font-weight: 700;
    margin-bottom: 16px;
    font-variant-numeric: tabular-nums;
  }
  .sel-chip.empty { background: var(--navy-card); color: var(--text-dim); }

  /* Success screen */
  .success-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; text-align: center;
    padding: 0;
  }
  .success-title { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; margin: 24px 0 10px; }
  .success-subtitle { font-size: 15px; color: var(--text-dim); line-height: 1.5; max-width: 280px; margin-bottom: 32px; }
  .confetti {
    position: absolute; width: 6px; height: 6px; border-radius: 2px;
    animation: confetti 2s ease-out infinite;
  }
  @keyframes confetti {
    0% { transform: translate(0, 0) rotate(0); opacity: 1; }
    100% { transform: translate(var(--tx), 400px) rotate(720deg); opacity: 0; }
  }

  .bottom-cta { margin-top: auto; padding-top: 16px; }

  .strength-row { display: flex; gap: 4px; margin-top: 8px; }
  .strength-bar {
    flex: 1; height: 3px; background: var(--border);
    border-radius: 2px; transition: background 0.2s;
  }
  .strength-bar.active-weak { background: var(--error); }
  .strength-bar.active-mid { background: var(--orange); }
  .strength-bar.active-strong { background: var(--teal); }

  /* ========= WELCOME SPLASH ========= */
  .splash-screen {
    padding: 0 !important;
    overflow: hidden; position: relative;
    background: radial-gradient(ellipse at 50% 55%, #0f1a2e 0%, #0a0f1e 45%, #060813 100%);
  }
  .splash-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 220px 180px at 42% 26%, rgba(0, 212, 170, 0.28), transparent 70%),
      radial-gradient(ellipse 180px 160px at 62% 32%, rgba(255, 107, 44, 0.24), transparent 65%);
    animation: splashPulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes splashPulse {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }
  .float-icon {
    position: absolute;
    color: rgba(255, 255, 255, 0.14);
    animation: floatIcon 6s ease-in-out infinite;
    pointer-events: none;
  }
  .float-padel { top: 6%; left: -6%; width: 110px; height: 130px; --rot: -22deg; transform: rotate(-22deg); }
  .float-basketball { top: 7%; right: -4%; width: 90px; height: 90px; animation-delay: 1s; }
  .float-glove { bottom: 22%; left: -8%; width: 95px; height: 105px; --rot: -15deg; transform: rotate(-15deg); animation-delay: 2s; }
  @keyframes floatIcon {
    0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
    50% { transform: translateY(-8px) rotate(var(--rot, 0deg)); }
  }

  .welcome-text-block {
    position: absolute; top: 280px; left: 0; right: 0;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px; z-index: 2;
  }
  .brand-wordmark {
    font-size: 56px; font-weight: 800; letter-spacing: -0.04em;
    color: #F8F8FB;
    animation: wordEntry 0.6s ease-out 0.3s backwards;
  }
  .brand-tagline {
    font-size: 13px; font-weight: 700; letter-spacing: 0.32em;
    color: var(--teal); text-transform: uppercase;
    animation: wordEntry 0.6s ease-out 0.5s backwards;
  }
  @keyframes wordEntry {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .splash-actions {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 24px 32px; z-index: 4;
    display: flex; flex-direction: column; gap: 10px;
    animation: actionsEntry 0.7s ease-out 0.7s backwards;
  }
  @keyframes actionsEntry {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .terms-splash {
    font-size: 11px; color: rgba(255, 255, 255, 0.4);
    text-align: center; line-height: 1.5; margin-top: 4px;
  }
  .terms-splash .link {
    font-size: 11px; color: rgba(255, 255, 255, 0.7); display: inline;
  }

  /* ========= TRAVELING RING ========= */
  .travel-ring {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transform-origin: center center;
    will-change: transform;
  }
  .travel-ring.active { opacity: 1; }
  .travel-ring svg { width: 100%; height: 100%; display: block; }

  /* Glow aura that bloomed behind the ring during flight */
  .travel-aura {
    position: absolute; inset: -35%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 212, 170, 0.55), rgba(255, 107, 44, 0.35) 45%, transparent 75%);
    opacity: 0;
    filter: blur(8px);
    transition: opacity 0.25s ease;
  }
  .travel-ring.active .travel-aura { opacity: 1; }

  /* Soft trail particles — 3 smaller rings fading behind */
  .travel-trail {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    will-change: transform, opacity;
  }
  .travel-trail svg { width: 100%; height: 100%; display: block; }

  /* The "landing bump" — when ring settles at target, phone gets a soft teal ripple */
  .phone.landing::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 36px;
    pointer-events: none;
    animation: landingRipple 0.8s var(--ease-smooth);
    z-index: 9;
  }
  @keyframes landingRipple {
    0% { box-shadow: inset 0 0 0 0 rgba(0, 212, 170, 0); }
    40% { box-shadow: inset 0 0 40px 8px rgba(0, 212, 170, 0.25); }
    100% { box-shadow: inset 0 0 0 0 rgba(0, 212, 170, 0); }
  }

  /* ========= RING LANDING EFFECTS ========= */
  /* Squash-and-stretch on impact */
  .page-mark.landing-impact svg {
    animation: ringImpact 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
  }
  @keyframes ringImpact {
    0% { transform: scale(1.15) rotate(0deg); }
    15% { transform: scale(1.35, 0.75) rotate(5deg); }
    30% { transform: scale(0.85, 1.2) rotate(-3deg); }
    50% { transform: scale(1.1, 0.95) rotate(2deg); }
    70% { transform: scale(0.97, 1.03) rotate(-1deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* Phone body subtle compress on impact */
  .phone.landing-shake {
    animation: phoneShake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }
  @keyframes phoneShake {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-1px, 2px); }
    20% { transform: translate(1px, -1px); }
    30% { transform: translate(-1px, 1px); }
    40% { transform: translate(1px, 0); }
    55% { transform: translate(0, -1px); }
    70% { transform: translate(0, 1px); }
  }

  /* Shockwave ring expanding outward */
  .landing-shockwave {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--teal);
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%);
    z-index: 8;
  }
  .landing-shockwave.fire {
    animation: shockwaveOut 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes shockwaveOut {
    0% {
      opacity: 0.9;
      width: 20px; height: 20px;
      border-width: 3px;
      border-color: rgba(0, 212, 170, 1);
    }
    100% {
      opacity: 0;
      width: 220px; height: 220px;
      border-width: 1px;
      border-color: rgba(0, 212, 170, 0);
    }
  }
  /* Second shockwave, orange, slightly delayed */
  .landing-shockwave-2 {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--orange);
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%);
    z-index: 8;
  }
  .landing-shockwave-2.fire {
    animation: shockwaveOut2 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }
  @keyframes shockwaveOut2 {
    0% {
      opacity: 0;
      width: 20px; height: 20px;
    }
    15% {
      opacity: 0.7;
      border-color: rgba(255, 107, 44, 0.9);
    }
    100% {
      opacity: 0;
      width: 280px; height: 280px;
      border-color: rgba(255, 107, 44, 0);
    }
  }

  /* Flash bloom behind ring on impact */
  .landing-flash {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(0, 212, 170, 0.85) 0%,
      rgba(255, 107, 44, 0.5) 25%,
      rgba(255, 107, 44, 0.2) 50%,
      transparent 75%);
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    opacity: 0;
    z-index: 7;
    filter: blur(12px);
  }
  .landing-flash.fire {
    animation: flashBloom 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes flashBloom {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
  }

  /* Spark particles */
  .spark {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    z-index: 9;
    will-change: transform, opacity;
    box-shadow: 0 0 8px currentColor;
  }
  .spark.fire {
    animation: sparkFly 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes sparkFly {
    0% {
      opacity: 1;
      transform: translate(-50%, -50%) translate(0, 0) scale(1);
    }
    40% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform:
        translate(-50%, -50%)
        translate(var(--spark-x), calc(var(--spark-y) + 60px))
        scale(0.3);
    }
  }

  /* Vertical light pillar (brief beam of light hitting the landing spot) */
  .landing-pillar {
    position: absolute;
    width: 4px;
    background: linear-gradient(to bottom,
      transparent,
      rgba(0, 212, 170, 0.6) 30%,
      rgba(0, 212, 170, 0.9) 50%,
      rgba(255, 107, 44, 0.5) 80%,
      transparent);
    pointer-events: none;
    opacity: 0;
    transform-origin: center bottom;
    transform: translateX(-50%) scaleY(0);
    z-index: 6;
    filter: blur(2px);
  }
  .landing-pillar.fire {
    animation: pillarStrike 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes pillarStrike {
    0% {
      opacity: 0;
      transform: translateX(-50%) scaleY(0);
    }
    30% {
      opacity: 1;
      transform: translateX(-50%) scaleY(1);
    }
    100% {
      opacity: 0;
      transform: translateX(-50%) scaleY(1);
    }
  }

  /* Incoming-page content eases in */
  .screen-enter {
    animation: screenEnter 0.6s var(--ease-smooth) 0.15s backwards;
  }
  @keyframes screenEnter {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Success ring collapses to a C — path itself opens up */
  .mark-success.opening .t-arc-teal {
    stroke-dasharray: 340;
    stroke-dashoffset: 0;
    animation: collapseTeal 1.4s var(--ease-swift) forwards;
  }
  .mark-success.opening .t-arc-orange {
    stroke-dasharray: 120;
    stroke-dashoffset: 0;
    animation: collapseOrange 1.0s var(--ease-swift) forwards;
  }
  /* Teal arc is the long one (sweeps ~270°). Shorten it slightly from its start (top) to open the C */
  @keyframes collapseTeal {
    0%   { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: 40; }
  }
  /* Orange arc is the short one at top-right. This fully retracts to disappear */
  @keyframes collapseOrange {
    0%   { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: 120; }
  }

  /* ========= LIVING C: gradient stops cycle colors on success ========= */
  /* Once the C has formed, each stop oscillates through the brand palette.
     Each stop has its own phase so colors appear to flow around the C. */
  .mark-success.opening .gstop-1 {
    animation: stopFlow 3.5s ease-in-out 1.6s infinite;
    animation-delay: 1.6s;
  }
  .mark-success.opening .gstop-2 {
    animation: stopFlow 3.5s ease-in-out infinite;
    animation-delay: 1.75s;
  }
  .mark-success.opening .gstop-3 {
    animation: stopFlowTeal 3.5s ease-in-out infinite;
    animation-delay: 1.9s;
  }
  .mark-success.opening .gstop-4 {
    animation: stopFlowTeal 3.5s ease-in-out infinite;
    animation-delay: 2.05s;
  }
  .mark-success.opening .gstop-5 {
    animation: stopFlow 3.5s ease-in-out infinite;
    animation-delay: 2.2s;
  }
  .mark-success.opening .gstop-6 {
    animation: stopFlow 3.5s ease-in-out infinite;
    animation-delay: 2.35s;
  }
  @keyframes stopFlow {
    0%   { stop-color: #FF6B2C; }
    25%  { stop-color: #FF8A4C; }
    50%  { stop-color: #FFD700; }
    75%  { stop-color: #FF8A4C; }
    100% { stop-color: #FF6B2C; }
  }
  @keyframes stopFlowTeal {
    0%   { stop-color: #00D4AA; }
    25%  { stop-color: #00E5B8; }
    50%  { stop-color: #00B894; }
    75%  { stop-color: #1AEAC0; }
    100% { stop-color: #00D4AA; }
  }

  /* Gradient direction sways, making the color positions drift around the C */
  .mark-success.opening svg defs linearGradient {
    /* Can't animate gradient coords via CSS; handled via SMIL below */
  }
  .success-burst {
    position: absolute; inset: -25%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 212, 170, 0.5), rgba(255, 107, 44, 0.28) 35%, transparent 70%);
    opacity: 0;
    pointer-events: none;
  }
  .mark-success.opening .success-burst {
    animation: successBurst 1.6s ease-out;
  }
  @keyframes successBurst {
    0% { opacity: 0; transform: scale(0.5); }
    30% { opacity: 1; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(2.2); }
  }

  @media (max-width: 900px) {
    .stage { padding: 12px; }
    .grid { gap: 20px; padding: 20px 0; }
  }
</style>
</head>

      </defs>
      <path ${withOpenClasses ? 'class="t-arc-teal"' : ''} d="M 150 42 A 70 70 0 1 0 145 157"

/* ========= Beautiful FLIP navigation ========= */
let transitionInProgress = false;

/* Custom easing curve (ease-out-back) */
function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function go(id) {
  if (transitionInProgress) return;
  const targetPhone = document.getElementById('phone-' + id);
  if (!targetPhone) return;

  // Find the closest visible phone as origin
  const stageRect = document.querySelector('.stage').getBoundingClientRect();
  const phones = document.querySelectorAll('.phone');
  let originPhone = null;
  let smallestDist = Infinity;
  const centerX = stageRect.left + stageRect.width / 2;
  const centerY = stageRect.top + stageRect.height / 2;
  phones.forEach(p => {
    const r = p.getBoundingClientRect();
    const d = Math.hypot(r.left + r.width/2 - centerX, r.top + r.height/2 - centerY);
    if (d < smallestDist) { smallestDist = d; originPhone = p; }
  });

  if (originPhone === targetPhone) {
    targetPhone.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
    return;
  }

  const originRing = originPhone.querySelector('.page-mark');
  const targetRing = targetPhone.querySelector('.page-mark');
  if (!originRing || !targetRing) {
    targetPhone.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
    return;
  }

  transitionInProgress = true;

  const travel = document.getElementById('travel-ring');
  const trails = [
    document.getElementById('trail-1'),
    document.getElementById('trail-2'),
    document.getElementById('trail-3'),
  ];

  // Capture origin geometry
  const originRect = originRing.getBoundingClientRect();

  // Hide both in-page rings during transition
  originRing.classList.add('hidden');
  targetRing.classList.add('hidden');

  // Position travel ring at origin, fade in
  travel.style.left = originRect.left + 'px';
  travel.style.top = originRect.top + 'px';
  travel.style.width = originRect.width + 'px';
  travel.style.height = originRect.height + 'px';
  travel.style.transform = 'rotate(0deg) scale(1)';
  travel.classList.add('active');

  // Also position trails
  trails.forEach(t => {
    t.style.left = originRect.left + 'px';
    t.style.top = originRect.top + 'px';
    t.style.width = originRect.width + 'px';
    t.style.height = originRect.height + 'px';
    t.style.opacity = '0';
  });

  // Scroll target into view
  targetPhone.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });

  // Wait a beat for the scroll to kick in so target position is accurate
  setTimeout(() => {
    const targetRect = targetRing.getBoundingClientRect();

    // Compute a curved path via control point between origin and target
    const x1 = originRect.left + originRect.width/2;
    const y1 = originRect.top + originRect.height/2;
    const x2 = targetRect.left + targetRect.width/2;
    const y2 = targetRect.top + targetRect.height/2;

    // Control point: above the midpoint, creating an arc
    // Lifts higher for longer horizontal distances
    const dx = x2 - x1;
    const dy = y2 - y1;
    const dist = Math.hypot(dx, dy);
    const liftAmount = Math.min(120, dist * 0.25);
    const cx = (x1 + x2) / 2;
    const cy = Math.min(y1, y2) - liftAmount;

    const duration = 900;
    const startTime = performance.now();

    const w1 = originRect.width, h1 = originRect.height;
    const w2 = targetRect.width, h2 = targetRect.height;

    // Scale bumps up mid-flight (the ring feels more alive)
    const peakScale = 1.15;

    function frame(now) {
      const elapsed = now - startTime;
      const tLinear = Math.min(1, elapsed / duration);
      const t = easeInOutCubic(tLinear);

      // Quadratic Bezier: B(t) = (1-t)^2 * P0 + 2(1-t)t * P1 + t^2 * P2
      const mt = 1 - t;
      const bx = mt*mt*x1 + 2*mt*t*cx + t*t*x2;
      const by = mt*mt*y1 + 2*mt*t*cy + t*t*y2;

      // Size lerps linearly (not along bezier)
      const w = w1 + (w2 - w1) * t;
      const h = h1 + (h2 - h1) * t;

      // Scale bump: 0 → peak → 0 across the flight
      const bumpT = Math.sin(tLinear * Math.PI);
      const scale = 1 + (peakScale - 1) * bumpT;

      // Rotation: 2 full spins, faster at the middle
      const rot = 720 * t;

      travel.style.left = (bx - w/2) + 'px';
      travel.style.top = (by - h/2) + 'px';
      travel.style.width = w + 'px';
      travel.style.height = h + 'px';
      travel.style.transform = `rotate(${rot}deg) scale(${scale})`;

      // Update trails with lag — each trail follows N frames behind
      trails.forEach((trail, idx) => {
        const lagT = Math.max(0, tLinear - 0.05 * (idx + 1));
        if (lagT <= 0) return;
        const lagEased = easeInOutCubic(lagT);
        const lmt = 1 - lagEased;
        const lbx = lmt*lmt*x1 + 2*lmt*lagEased*cx + lagEased*lagEased*x2;
        const lby = lmt*lmt*y1 + 2*lmt*lagEased*cy + lagEased*lagEased*y2;
        const lw = w1 + (w2 - w1) * lagEased;
        const lh = h1 + (h2 - h1) * lagEased;
        const lagBump = Math.sin(lagT * Math.PI);
        const lagScale = 1 + (peakScale - 1) * lagBump;
        const lagRot = 720 * lagEased;

        trail.style.left = (lbx - lw/2) + 'px';
        trail.style.top = (lby - lh/2) + 'px';
        trail.style.width = lw + 'px';
        trail.style.height = lh + 'px';
        trail.style.transform = `rotate(${lagRot}deg) scale(${lagScale})`;
        // Fade in the trail only during the middle of the flight
        const trailOpacity = Math.sin(lagT * Math.PI) * 0.7;
        trail.style.opacity = trailOpacity;
      });

      if (tLinear < 1) {
        requestAnimationFrame(frame);
      } else {
        // ========= LANDING SEQUENCE =========
        travel.classList.remove('active');
        trails.forEach(t => t.style.opacity = '0');
        targetRing.classList.remove('hidden');
        originRing.classList.remove('hidden');

        // Fire all landing effects at the target ring's final position
        fireLandingEffects(targetPhone, targetRing);

        // If we landed on success, trigger opening after the landing animation finishes
        if (id === 'success') {
          setTimeout(() => {
            const sr = targetPhone.querySelector('.mark-success');
            if (sr) sr.classList.add('opening');
          }, 700);
        }
        transitionInProgress = false;
      }
    }
    requestAnimationFrame(frame);
  }, 80);
}

/* ========= Landing effect orchestration ========= */
function fireLandingEffects(phone, ring) {
  const phoneRect = phone.getBoundingClientRect();
  const ringRect = ring.getBoundingClientRect();

  // Center point of landing, in phone-local coordinates
  const cx = ringRect.left + ringRect.width / 2 - phoneRect.left;
  const cy = ringRect.top + ringRect.height / 2 - phoneRect.top;

  // 1. Squash-and-stretch on the ring itself
  ring.classList.add('landing-impact');
  setTimeout(() => ring.classList.remove('landing-impact'), 680);

  // 2. Phone body shake + ripple
  phone.classList.add('landing', 'landing-shake');
  setTimeout(() => phone.classList.remove('landing', 'landing-shake'), 820);

  // 3. Shockwave rings (teal + orange)
  const shockwave1 = document.createElement('div');
  shockwave1.className = 'landing-shockwave';
  shockwave1.style.left = cx + 'px';
  shockwave1.style.top = cy + 'px';
  phone.appendChild(shockwave1);
  requestAnimationFrame(() => shockwave1.classList.add('fire'));
  setTimeout(() => shockwave1.remove(), 1000);

  const shockwave2 = document.createElement('div');
  shockwave2.className = 'landing-shockwave-2';
  shockwave2.style.left = cx + 'px';
  shockwave2.style.top = cy + 'px';
  phone.appendChild(shockwave2);
  requestAnimationFrame(() => shockwave2.classList.add('fire'));
  setTimeout(() => shockwave2.remove(), 1200);

  // 4. Flash bloom
  const flash = document.createElement('div');
  flash.className = 'landing-flash';
  flash.style.left = cx + 'px';
  flash.style.top = cy + 'px';
  phone.appendChild(flash);
  requestAnimationFrame(() => flash.classList.add('fire'));
  setTimeout(() => flash.remove(), 750);

  // 5. Light pillar (beam of light struck the landing point)
  const pillar = document.createElement('div');
  pillar.className = 'landing-pillar';
  pillar.style.left = cx + 'px';
  pillar.style.top = '0';
  pillar.style.height = cy + 'px';
  phone.appendChild(pillar);
  requestAnimationFrame(() => pillar.classList.add('fire'));
  setTimeout(() => pillar.remove(), 600);

  // 6. Spark particles flying outward
  const sparkCount = 12;
  const colors = ['#00D4AA', '#00D4AA', '#FF6B2C', '#FF6B2C', '#FFD700', '#FFFFFF'];
  for (let i = 0; i < sparkCount; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    spark.style.left = cx + 'px';
    spark.style.top = cy + 'px';
    spark.style.background = colors[i % colors.length];
    spark.style.color = colors[i % colors.length];
    // Random direction, distance, and size
    const angle = (i / sparkCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const distance = 50 + Math.random() * 80;
    const sx = Math.cos(angle) * distance;
    const sy = Math.sin(angle) * distance;
    const size = 3 + Math.random() * 5;
    spark.style.setProperty('--spark-x', sx + 'px');
    spark.style.setProperty('--spark-y', sy + 'px');
    spark.style.width = size + 'px';
    spark.style.height = size + 'px';
    phone.appendChild(spark);
    requestAnimationFrame(() => spark.classList.add('fire'));
    setTimeout(() => spark.remove(), 900);
  }
}

function goPrev(currentId) {

function toggleSport(name) {
  if (state.sports.has(name)) state.sports.delete(name);
  else state.sports.add(name);
  render();
}
function togglePw(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; btn.innerHTML = I.eyeOff; }
  else { input.type = 'password'; btn.innerHTML = I.eye; }
}
function updateStrength(val) {
  const bars = document.querySelectorAll('#strength .strength-bar');
  bars.forEach(b => b.className = 'strength-bar');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const cls = score <= 1 ? 'active-weak' : score <= 2 ? 'active-mid' : 'active-strong';
  for (let i = 0; i < score; i++) bars[i]?.classList.add(cls);
}
function otpInput(el) {
  el.value = el.value.replace(/[^0-9]/g, '');
  if (el.value) {
    el.classList.add('filled');
    const next = el.parentElement.querySelector(`[data-i="${+el.dataset.i + 1}"]`);
    if (next) next.focus();
  } else el.classList.remove('filled');
}
function otpKey(e, el) {
  if (e.key === 'Backspace' && !el.value) {
    const prev = el.parentElement.querySelector(`[data-i="${+el.dataset.i - 1}"]`);
    if (prev) { prev.focus(); prev.value = ''; prev.classList.remove('filled'); }
  }
}
