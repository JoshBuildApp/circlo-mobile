<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Content Security Policy: blocks inline scripts (XSS), restricts
         network calls to Supabase + Stripe. inline styles + 'unsafe-inline'
         scripts allowed because Vite/React inject them; tighten with nonces
         in a future pass. Capacitor mobile WebView ignores meta CSP — that's
         enforced in capacitor.config + native manifests instead. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com data:;
               img-src 'self' https: data: blob:;
               media-src 'self' https: blob:;
               connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://api.stripe.com https://o*.ingest.sentry.io;
               frame-src https://js.stripe.com https://hooks.stripe.com;
               object-src 'none';
               base-uri 'self';
               form-action 'self';"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Circlo" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1A1A2E" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <!-- Prevent iOS Safari from auto-detecting / linkifying content. -->
    <meta name="color-scheme" content="dark light" />
    <!-- Tight Content-Security-Policy is set per-platform in capacitor.config + native manifests. -->
    <link rel="preconnect" href="https://rsevfeogormnorvcvxio.supabase.co" />
    <link rel="dns-prefetch" href="https://rsevfeogormnorvcvxio.supabase.co" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Circlo — Find Your Circle</title>
    <meta
      name="description"
      content="Circlo — the sports coaching marketplace. Discover coaches, book sessions, train with your circle. iOS + Android."
    />
    <meta name="author" content="Circlo" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Orange app-icon — matches the iOS + Android native AppIcon assets.
         The inline SVG that used to live here was a placeholder that overrode
         every PNG/ICO downstream. Removed so the brand "C" actually renders
         in tabs, taskbars, and pinned shortcuts. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background-color: #1a1a2e;
        -webkit-font-smoothing: antialiased;
      }
      /* Initial paint color while the React bundle is parsing. */
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
          circle at 50% 40%,
          #1a1a2e 0%,
          #0f0f1e 100%
        );
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
