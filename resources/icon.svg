<?xml version="1.0" encoding="UTF-8"?>
<!--
  Circlo app icon — orange variant.
  Rebuilt 1:1 from the existing favicon mark so pixel-exact geometry is
  preserved at 1024×1024. The 56-unit favicon is scaled up 1024/56 ≈ 18.29×.
  iOS applies its own rounded-corner mask, so the bg is a full square.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Solid brand orange background -->
  <rect width="1024" height="1024" fill="#FF6B2C"/>

  <!-- Main C ring — partial stroke with rounded caps.
       In the 56-unit mark: cx=28 cy=28 r=18, stroke-width=5.5.
       Scaled: cx=512 cy=512 r=329, stroke-width=~100, dasharray scales too. -->
  <circle
    cx="512" cy="512" r="329"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="100"
    stroke-linecap="round"
    stroke-dasharray="1720 347"
  />

  <!-- Dot above the C opening.
       Original: cx=42 cy=15 r=3.5  →  scaled cx=768 cy=274 r=64 -->
  <circle cx="768" cy="274" r="64" fill="#FFFFFF"/>
</svg>
